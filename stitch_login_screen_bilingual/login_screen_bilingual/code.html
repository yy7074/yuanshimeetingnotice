<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#196ee6",
                "background-light": "#f6f7f8",
                "background-dark": "#111821",
              },
              fontFamily: {
                "display": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<title>Meeting Management Login</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="flex items-center justify-between p-6 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-2">
<div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined"> corporate_fare </span>
</div>
<h2 class="text-xl font-bold tracking-tight">MeetingPro</h2>
</div>
<div class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-sm text-primary">language</span>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300">EN / CN</span>
</div>
</header>
<main class="flex-1 flex items-center justify-center px-4 py-12">
<div class="w-full max-w-[480px] bg-white dark:bg-slate-900 p-8 rounded-xl shadow-xl border border-slate-100 dark:border-slate-800">
<div class="mb-8">
<h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
<h2 class="text-xl font-medium text-slate-500 dark:text-slate-400 mb-4">欢迎回来</h2>
<p class="text-slate-600 dark:text-slate-400">
                    Please sign in to your corporate account <br/>
<span class="text-sm">请登录您的企业账户</span>
</p>
</div>
<form class="space-y-6">
<div>
<label class="block mb-2">
<span class="text-slate-700 dark:text-slate-300 font-medium">Email / 邮箱</span>
</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="w-full pl-12 pr-4 h-14 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="corporate@company.com" type="email"/>
</div>
</div>
<div>
<label class="block mb-2">
<span class="text-slate-700 dark:text-slate-300 font-medium">Password / 密码</span>
</label>
<div class="flex items-stretch rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus-within:ring-2 focus-within:ring-primary focus-within:border-transparent transition-all">
<div class="flex items-center justify-center pl-4 text-slate-400">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="flex-1 bg-transparent border-none h-14 px-4 focus:ring-0 outline-none" placeholder="••••••••" type="password"/>
<button class="px-4 flex items-center justify-center text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between py-2">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center">
<input checked="" class="peer h-5 w-5 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary bg-white dark:bg-slate-800" type="checkbox"/>
</div>
<div class="flex flex-col">
<span class="text-sm font-medium text-slate-700 dark:text-slate-300">Remember Me</span>
<span class="text-xs text-slate-500">记住我</span>
</div>
</label>
<a class="text-sm font-semibold text-primary hover:underline" href="#">
                        Forgot Password? <br/>
<span class="text-[10px] block text-right">忘记密码？</span>
</a>
</div>
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
<span>Sign In / 登录</span>
<span class="material-symbols-outlined">login</span>
</button>
</form>
<div class="mt-8 pt-8 border-t border-slate-100 dark:border-slate-800">
<div class="flex flex-col items-center gap-4">
<p class="text-xs text-slate-400 uppercase tracking-widest font-bold">Authorized Access Only</p>
<div class="flex gap-6">
<div class="flex items-center gap-1 text-slate-400">
<span class="material-symbols-outlined text-base">shield</span>
<span class="text-[10px] uppercase font-bold">Secure</span>
</div>
<div class="flex items-center gap-1 text-slate-400">
<span class="material-symbols-outlined text-base">verified_user</span>
<span class="text-[10px] uppercase font-bold">Encrypted</span>
</div>
</div>
</div>
</div>
</div>
</main>
<footer class="p-6 text-center">
<p class="text-xs text-slate-400">
            © 2024 MeetingPro Management Systems. All rights reserved. <br/>
            © 2024 会议管理系统。保留所有权利。
        </p>
</footer>
</body></html>
